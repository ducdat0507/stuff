<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
        <title>the blarbmaker</title>

        <script src="https://cdn.jsdelivr.net/npm/showdown@1.9.0/dist/showdown.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/lib/codemirror.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/mode/markdown/markdown.js"></script>

        <script defer src="scripts/main.js"></script>

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/lib/codemirror.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/theme/ayu-mirage.css">
        <link rel="stylesheet" href="styles/main.css">

        <link rel="manifest" href="manifest.json">
    </head>
    <body>
        <div id="main-container" style="--preview-size: 0.5">
            <div id="navigation-bar">
            </div>
            <div id="post-composer-container">
                <div id="post-preview"></div>
                <div id="post-toolbar">
                    <div id="post-resize-handle">
                        <iconify-icon icon="lucide:grip-vertical" style="opacity: 0.5"></iconify-icon>
                    </div>
                </div>
                <div id="post-input-holder">
                </div>
            </div>
        </div>
    </body>
</html>
