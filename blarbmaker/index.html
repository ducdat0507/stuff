<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
        <title>the blarbmaker</title>

        <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.1/dist/markdown-it.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/iconify-icon@3.0.0/dist/iconify-icon.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/lib/codemirror.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/mode/markdown/markdown.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/addon/selection/active-line.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/addon/view/.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.1/dist/js-yaml.min.js"></script>

        <script src="scripts/ext.js"></script>
        <script src="scripts/ext/markdown-it-front-matter/index.js"></script>
        <script src="scripts/ext/markdown-it-source-map/index.js"></script>
        <script src="scripts/ext/markdown-it-underline/index.js"></script>
        <script src="scripts/ext/markdown-it-custom-replacement/index.js"></script>
        <script src="scripts/ext/codemirror-whitespaces/index.js"></script>

        <script src="scripts/storage.js"></script>
        <script src="scripts/toolbar.js"></script>
        <script src="scripts/utils.js"></script>
        <script src="scripts/prefs.js"></script>
        <script src="scripts/form.js"></script>

        <script src="scripts/popup.js"></script>
        <script src="scripts/popups/storage.js"></script>
        <script src="scripts/popups/prefs.js"></script>
        <script src="scripts/popups/prefsFancyPants.js"></script>
        <script src="scripts/popups/toc.js"></script>
        <script src="scripts/popups/preview.js"></script>
        <script src="scripts/popups/deletePost.js"></script>

        <script defer src="scripts/main.js"></script>

        
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/lib/codemirror.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@6.65.7/theme/ayu-dark.css">
        <link rel="stylesheet" href="styles/main.css">

        <link rel="stylesheet" href="scripts/ext/codemirror-whitespaces/index.css">

        <link rel="manifest" href="manifest.json">
    </head>
    <body>
        <div id="main-container" style="--preview-size: 0.5">
            <div id="navigation-bar" class="tool-bar">
            </div>
            <div id="post-composer-container">
                <div id="post-preview"></div>
                <div id="post-toolbar" class="tool-bar">
                    <div id="post-toolbar-items" class="filler"></div>
                    <hr/>
                    <div id="post-toolbar-side-items"></div>
                    <hr/>
                    <div id="post-resize-handle">
                        <iconify-icon icon="lucide:grip" style="opacity: 0.5"></iconify-icon>
                    </div>
                </div>
                <div id="post-input-holder">
                </div>
            </div>
        </div>
    </body>
</html>
